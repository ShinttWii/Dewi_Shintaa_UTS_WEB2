<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BagVerse | Wishlist</title>
    <script>
        (function() {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        html.dark body { background-color: #111827; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 dark:text-white transition-all min-h-screen">
    
    <nav class="p-6 border-b dark:border-gray-800 flex justify-between font-bold bg-white/80 dark:bg-gray-900/80 backdrop-blur-md sticky top-0 z-50">
        <h1 class="text-xl font-black text-indigo-600 cursor-pointer" onclick="location.href='index.html'">BAGVERSE.</h1>
        <div class="space-x-6 text-sm">
            <a href="index.html" class="opacity-60 hover:opacity-100 transition">Beranda</a>
            <a href="wishlist.html" class="text-indigo-600 border-b-2 border-indigo-600 pb-1">Wishlist</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-10 max-w-5xl">
        <h2 class="text-3xl font-black italic uppercase tracking-tighter mb-8">Daftar Keinginan</h2>
        
        <div id="wishlist-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-40 opacity-0 transition-all duration-500"></div>

    <script type="module">
        import { Store, showToast } from './app.js';
        Store.initTheme();

        function renderWishlist() {
            const container = document.getElementById('wishlist-grid');
            const list = Store.getWishlist();

            if(list.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-20 text-center opacity-30 font-bold italic">
                        <p class="text-5xl mb-4">✨</p>
                        <p>Belum ada barang impian yang disimpan.</p>
                    </div>`;
                return;
            }

            container.innerHTML = list.map(p => `
                <div class="bg-white dark:bg-gray-800 p-4 rounded-[32px] border dark:border-gray-700 shadow-sm flex flex-col group h-full">
                    <div class="h-48 overflow-hidden rounded-2xl mb-4">
                        <img src="${p.image}" onerror="this.src='https://placehold.co/500x500?text=No+Img'" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                    </div>
                    
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">${p.category || 'Unisex'}</span>
                        <div class="text-yellow-400 text-[10px]">${'⭐'.repeat(p.rating || 5)}</div>
                    </div>

                    <h3 class="font-bold text-lg leading-tight mb-2">${p.name}</h3>
                    
                    <p class="text-[11px] opacity-60 mb-6 line-clamp-2 min-h-[32px]">
                        ${p.description || 'Koleksi tas premium BagVerse.'}
                    </p>

                    <div class="mt-auto">
                        <p class="text-indigo-600 font-black text-xl mb-4">Rp ${p.price.toLocaleString('id-ID')}</p>
                        <div class="flex gap-2">
                            <button onclick="removeWish(${p.id})" class="flex-1 bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-300 py-3 rounded-xl font-bold text-[10px] hover:bg-red-50 hover:text-red-500 transition">Hapus</button>
                            <button onclick="toCart(${p.id})" class="flex-[2] bg-indigo-600 text-white py-3 rounded-xl font-bold text-[10px] hover:bg-indigo-700 active:scale-95 transition shadow-lg shadow-indigo-100 dark:shadow-none uppercase">Ke Keranjang</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.removeWish = (id) => {
            let list = Store.getWishlist().filter(x => x.id !== id);
            Store.saveWishlist(list);
            renderWishlist();
            showToast("💔 Dihapus dari Wishlist");
        };

        window.toCart = (id) => {
            const wishlist = Store.getWishlist();
            const product = wishlist.find(x => x.id === id);
            
            if (product) {
                let cart = Store.getCart();
                const exist = cart.find(x => x.id === id);
                
                if(exist) {
                    exist.qty++;
                } else {
                    cart.push({...product, qty: 1});
                }
                
                Store.saveCart(cart);

                // Hapus dari Wishlist setelah pindah ke Cart
                const newList = wishlist.filter(x => x.id !== id);
                Store.saveWishlist(newList);

                showToast("🛍️ Berhasil dipindah ke Keranjang!");
                renderWishlist();
            }
        };

        renderWishlist();
    </script>
</body>
</html>
