<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagVerse | Home Official</title>
    <script>
        (function() {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class',
            theme: { extend: { colors: { indigo: { 600: '#4f46e5' } } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        html.dark body { background-color: #111827; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 dark:text-white transition-all duration-300 min-h-screen">

    <nav class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-md sticky top-0 z-50 p-4 border-b dark:border-gray-800 shadow-sm font-bold">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-indigo-600 cursor-pointer tracking-tighter" onclick="location.href='index.html'">BAGVERSE.</h1>
            <div class="flex items-center space-x-6 text-sm">
                <a href="index.html" class="text-indigo-600">Beranda</a>
                <a href="wishlist.html" class="opacity-60 hover:opacity-100 transition">Wishlist</a>
                <a href="history.html" class="opacity-60 hover:opacity-100 transition">Riwayat</a>
                <a href="cart.html" class="relative text-xl">👜 <span id="cart-count" class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] px-1.5 rounded-full font-bold border-2 border-white dark:border-gray-800">0</span></a>
                <div id="nav-auth"></div>
                <button onclick="toggleTheme()" class="p-2 bg-gray-100 dark:bg-gray-700 rounded-xl">🌓</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="flex flex-col md:flex-row gap-4 mb-10">
            <input type="text" id="search" placeholder="Cari tas impianmu..." class="flex-1 p-4 rounded-2xl bg-white dark:bg-gray-800 border-none shadow-md outline-none focus:ring-2 focus:ring-indigo-500 transition">
            
            <div class="flex gap-2">
                <select id="filter-cat" class="p-4 rounded-2xl bg-white dark:bg-gray-800 border-none shadow-md outline-none font-bold cursor-pointer text-sm">
                    <option value="">Semua Kategori</option>
                    <option value="Pria">Pria</option>
                    <option value="Wanita">Wanita</option>
                    <option value="Unisex">Unisex</option>
                </select>

                <select id="sort-price" class="p-4 rounded-2xl bg-white dark:bg-gray-800 border-none shadow-md outline-none font-bold cursor-pointer text-sm text-indigo-600">
                    <option value="default">Urutan</option>
                    <option value="cheap">Harga: Termurah</option>
                    <option value="expensive">Harga: Termahal</option>
                </select>
            </div>
        </div>

        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 mb-12"></div>

        <div id="pagination" class="flex justify-center items-center gap-6 pb-10">
            <button id="prev-page" class="bg-white dark:bg-gray-800 px-6 py-2 rounded-xl shadow-md font-bold disabled:opacity-20 transition active:scale-90">Prev</button>
            <div class="flex flex-col items-center">
                <span id="page-info" class="font-black text-xs uppercase opacity-40 tracking-widest">Page 1 of 1</span>
            </div>
            <button id="next-page" class="bg-white dark:bg-gray-800 px-6 py-2 rounded-xl shadow-md font-bold disabled:opacity-20 transition active:scale-90">Next</button>
        </div>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-40 opacity-0 transition-all duration-500"></div>

    <script type="module">
        import { Store, showToast } from './app.js';
        Store.initTheme();

        let currentPage = 1;
        const productsPerPage = 6;

        async function render() {
            const products = await Store.getProducts();
            const q = document.getElementById('search').value.toLowerCase();
            const fCat = document.getElementById('filter-cat').value;
            const sortVal = document.getElementById('sort-price').value;
            const container = document.getElementById('product-grid');

            // 1. FILTERING
            let filtered = products.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(q);
                const matchCat = fCat === "" || p.category === fCat;
                return matchSearch && matchCat;
            });

            // 2. SORTING
            if (sortVal === "cheap") filtered.sort((a, b) => a.price - b.price);
            else if (sortVal === "expensive") filtered.sort((a, b) => b.price - a.price);

            // 3. PAGINATION LOGIC
            const totalPages = Math.ceil(filtered.length / productsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const start = (currentPage - 1) * productsPerPage;
            const paginatedItems = filtered.slice(start, start + productsPerPage);

            // Update UI Pagination
            document.getElementById('page-info').innerText = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prev-page').disabled = (currentPage === 1);
            document.getElementById('next-page').disabled = (currentPage === totalPages);

            // 4. RENDER TO HTML
            if (paginatedItems.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center opacity-30 font-bold italic">Produk tidak ditemukan...</div>`;
                return;
            }

            container.innerHTML = paginatedItems.map(p => {
                const isWish = Store.getWishlist().some(x => x.id === p.id);
                return `
                <div class="bg-white dark:bg-gray-800 p-4 rounded-[32px] shadow-sm hover:shadow-xl transition-all duration-300 group border dark:border-gray-700 flex flex-col relative">
                    <button onclick="handleWish(${p.id})" class="absolute top-6 right-6 z-10 p-2 rounded-full bg-white/80 dark:bg-gray-700/80 shadow-sm hover:scale-110 transition active:scale-90">
                        <span class="${isWish ? 'text-red-500' : 'text-gray-400'}">${isWish ? '❤️' : '🤍'}</span>
                    </button>
                    <div class="h-64 overflow-hidden rounded-2xl mb-4">
                        <img src="${p.image}" onerror="this.src='https://placehold.co/500x500?text=No+Img'" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                    </div>
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-black text-indigo-500 uppercase tracking-widest">${p.category || 'Unisex'}</span>
                        <span class="text-yellow-500 text-xs">${'⭐'.repeat(p.rating || 5)}</span>
                    </div>
                    <h3 class="font-bold text-lg leading-tight mb-2">${p.name}</h3>
                    <p class="text-xs opacity-60 mb-6 line-clamp-2 min-h-[32px]">${p.description || 'Premium collection.'}</p>
                    <div class="mt-auto flex justify-between items-center">
                        <span class="font-black text-indigo-600 text-xl">Rp ${p.price.toLocaleString('id-ID')}</span>
                        <button onclick="addCart(${p.id})" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-indigo-700 active:scale-95 transition">Add</button>
                    </div>
                </div>`;
            }).join('');
        }

        // Event Handlers
        window.addCart = async (id) => {
            const all = await Store.getProducts();
            const p = all.find(x => x.id === id);
            let cart = Store.getCart();
            const exist = cart.find(x => x.id === id);
            if(exist) exist.qty++; else cart.push({...p, qty: 1});
            Store.saveCart(cart);
            showToast("🛍️ Berhasil ditambah!");
            updateNav();
        };

        window.handleWish = async (id) => {
            const all = await Store.getProducts();
            const p = all.find(x => x.id === id);
            const res = Store.toggleWishlist(p);
            Store.saveWishlist(res.data);
            showToast(res.action === 'added' ? "❤️ Tersimpan!" : "💔 Dihapus");
            render();
        };

        window.toggleTheme = () => {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        };

        function updateNav() {
            const user = Store.getUser();
            document.getElementById('cart-count').innerText = Store.getCart().length;
            const navAuth = document.getElementById('nav-auth');
            if (user) {
                navAuth.innerHTML = `
                    <div class="flex items-center gap-4">
                        ${user.role === 'admin' ? `<a href="admin.html" class="bg-black text-white px-3 py-1 rounded text-[10px] font-black tracking-widest">ADMIN</a>` : ''}
                        <button onclick="logout()" class="text-red-500 font-bold uppercase text-[10px]">Logout</button>
                    </div>`;
            } else {
                navAuth.innerHTML = `<a href="login.html" class="bg-indigo-600 text-white px-5 py-2 rounded-xl font-bold hover:bg-indigo-700">Login</a>`;
            }
        }

        // Pagination Buttons
        document.getElementById('prev-page').onclick = () => { if(currentPage > 1) { currentPage--; render(); window.scrollTo({top: 0, behavior: 'smooth'}); } };
        document.getElementById('next-page').onclick = () => { currentPage++; render(); window.scrollTo({top: 0, behavior: 'smooth'}); };

        // Reset Halaman jika filter/search berubah
        const resetPage = () => { currentPage = 1; render(); };
        document.getElementById('search').oninput = resetPage;
        document.getElementById('filter-cat').onchange = resetPage;
        document.getElementById('sort-price').onchange = resetPage;

        window.logout = Store.logout;
        render(); 
        updateNav();
    </script>
</body>
</html>
