<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>BagVerse | Riwayat Belanja</title>
    <script>
        (function() {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        html.dark body { background-color: #111827; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 dark:text-white transition-all min-h-screen">
    
    <nav class="p-6 border-b dark:border-gray-800 flex justify-between font-bold sticky top-0 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md z-50">
        <h1 class="text-xl font-black text-indigo-600 cursor-pointer" onclick="location.href='index.html'">BAGVERSE.</h1>
        <div class="space-x-6 text-sm">
            <a href="index.html" class="opacity-60 hover:opacity-100 transition">Beranda</a>
            <a href="history.html" class="text-indigo-600 border-b-2 border-indigo-600 pb-1">Riwayat</a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-10 max-w-3xl">
        <div class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
            <div>
                <h2 class="text-3xl font-black italic uppercase tracking-tighter">Pesanan Saya</h2>
                
            </div>
            
            <div class="relative w-full md:w-64">
                <input type="text" id="search-history" placeholder="Cari nama produk..." 
                    class="w-full p-3 pl-10 rounded-2xl bg-white dark:bg-gray-800 border dark:border-gray-700 outline-none text-xs focus:ring-2 focus:ring-indigo-500 transition">
                <span class="absolute left-3 top-3 opacity-30 text-sm">🔍</span>
            </div>
        </div>

        <div id="order-history-list" class="space-y-6"></div>
    </main>

    <script type="module">
        import { Store } from './app.js';
        Store.initTheme();

        const user = Store.getUser();
        if(!user) window.location.href = 'login.html';

        function renderHistory() {
            const container = document.getElementById('order-history-list');
            const query = document.getElementById('search-history').value.toLowerCase();
            const allOrders = JSON.parse(localStorage.getItem('orders')) || [];
            
            // 1. Filter berdasarkan User
            let myOrders = allOrders.filter(o => o.userEmail === user.email);

            // 2. Filter berdasarkan Nama Produk (Search)
            if (query) {
                myOrders = myOrders.filter(order => 
                    order.items.some(item => item.name.toLowerCase().includes(query))
                );
            }

            // Urutkan dari yang terbaru
            myOrders.reverse();

            if(myOrders.length === 0) {
                container.innerHTML = `
                    <div class="p-20 text-center bg-white dark:bg-gray-800 rounded-[40px] border-2 border-dashed dark:border-gray-700 opacity-40">
                        <p class="text-4xl mb-4">🔍</p>
                        <p class="font-bold italic text-sm">Pesanan "${query}" tidak ditemukan.</p>
                    </div>`;
                return;
            }

            container.innerHTML = myOrders.map(o => `
                <div class="bg-white dark:bg-gray-800 p-8 rounded-[40px] border dark:border-gray-700 shadow-sm space-y-6">
                    <div class="flex justify-between items-start border-b dark:border-gray-700 pb-4">
                        <div>
                            <span class="text-[10px] font-black bg-indigo-600 text-white px-2 py-1 rounded uppercase tracking-widest">${o.orderId}</span>
                            <p class="text-[10px] opacity-50 mt-2 font-bold">${o.date}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[10px] font-black text-green-500 bg-green-50 dark:bg-green-900/20 px-3 py-1 rounded-full uppercase">Selesai</span>
                        </div>
                    </div>

                    <div class="space-y-4">
                        ${o.items.map(item => `
                            <div class="flex justify-between items-center text-xs">
                                <div class="flex items-center gap-3">
                                    <img src="${item.image}" onerror="this.src='https://placehold.co/500x500?text=No+Img'" class="w-10 h-10 rounded-xl object-cover">
                                    <div>
                                        <p class="font-bold">${item.name}</p>
                                        <p class="text-[10px] opacity-50">${item.qty} x Rp ${item.price.toLocaleString('id-ID')}</p>
                                    </div>
                                </div>
                                <span class="font-black">Rp ${(item.price * item.qty).toLocaleString('id-ID')}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="grid md:grid-cols-2 gap-6 bg-gray-50 dark:bg-gray-900/50 p-6 rounded-3xl border dark:border-gray-700">
                        <div>
                            <p class="text-[10px] font-black opacity-40 uppercase mb-2">Tujuan:</p>
                            <p class="text-[11px] font-bold">${o.shipping.name}</p>
                            <p class="text-[11px] opacity-60 leading-tight mt-1 italic">${o.shipping.address}</p>
                        </div>
                        <div class="md:text-right md:border-l dark:border-gray-700 md:pl-4">
                            <p class="text-[10px] font-black opacity-40 uppercase mb-2">Info Bayar:</p>
                            <p class="text-[11px] font-bold uppercase">${o.payment || 'QRIS'}</p>
                            <p class="text-[11px] opacity-60 mt-1">Total Ongkir: Rp ${(o.shipping.cost || 0).toLocaleString('id-ID')}</p>
                        </div>
                    </div>

                    <div class="flex justify-between items-center pt-2">
                        <p class="text-sm font-bold opacity-60 uppercase tracking-tighter">Total Bayar</p>
                        <p class="text-2xl font-black text-indigo-600">Rp ${o.totalPrice.toLocaleString('id-ID')}</p>
                    </div>
                </div>
            `).join('');
        }

        // Listener untuk fitur search
        document.getElementById('search-history').addEventListener('input', renderHistory);

        renderHistory();
    </script>
</body>
</html>
